<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Position Projector</title>
    <style>
  body {
    font-family: sans-serif;
    max-width: 400px;
    margin: 40px auto;
  }

  h1 {
    font-size: 1.2rem;
    margin-bottom: 24px;
  }

  label {
    display: block;
    margin-bottom: 4px;
    font-size: 0.9rem;
    color: #555;
  }

  input {
    display: block;
    margin-bottom: 16px;
    padding: 6px;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
  }

  #results {
    margin-top: 24px;
    line-height: 2;
  }
</style>
  </head>
  <body>
    <h1>Theme Position Projector</h1>

    <label for="startAmount">Starting amount (kr.)</label>
    <input id="startAmount" type="number" value="10000" oninput="calculate()" />


    <label for="growthRate">Expected annual growth (%)</label>
    <input id="growthRate" type="number" value="7" oninput="calculate()" />


    <label for="years">Number of years</label>
    <input id="years" type="number" value="10" oninput="calculate()" />

    <div id="results">
      Results will appear here.
    </div>

    <hr />

    <h2>My Themes</h2>

    <label for="themeName">Theme name</label>
    <input id="themeName" type="text" placeholder="e.g. Clean Energy" />

    <label for="themeTickers">Tickers</label>
    <input id="themeTickers" type="text" placeholder="e.g. TSLA, ENPH, NEE" />

    <button onclick="addTheme()">Add theme</button>

    <div id="themeList"></div>

<script>
  function calculate() {
    var start = Number(document.getElementById("startAmount").value);
    var rate = Number(document.getElementById("growthRate").value) / 100;
    var years = Number(document.getElementById("years").value);

    var finalValue = start * Math.pow(1 + rate, years);
    var totalInvested = start;
    var gain = finalValue - totalInvested;

    document.getElementById("results").innerHTML =
      "Projected value: " + Math.round(finalValue) + " kr." + "<br>" +
      "Total invested: " + totalInvested + " kr." + "<br>" +
      "Gain: " + Math.round(gain) + " kr.";
  }

  calculate();

  function addTheme() {
    var name = document.getElementById("themeName").value.trim();
    var tickers = document.getElementById("themeTickers").value.trim();

    if (name === "") {
      alert("Please enter a theme name.");
      return;
    }

    var themes = loadThemes();
    themes.push({ name: name, tickers: tickers });
    saveThemes(themes);
    renderThemes(themes);

    document.getElementById("themeName").value = "";
    document.getElementById("themeTickers").value = "";
  }

  function loadThemes() {
    var stored = localStorage.getItem("themes");
    if (stored === null) {
      return [];
    }
    return JSON.parse(stored);
  }

  function saveThemes(themes) {
    localStorage.setItem("themes", JSON.stringify(themes));
  }

  function renderThemes(themes) {
    var list = document.getElementById("themeList");
    list.innerHTML = "";
    for (var i = 0; i < themes.length; i++) {
      list.innerHTML += 
        "<p>" +
          "<strong>" + themes[i].name + "</strong> — " + themes[i].tickers +
          " <button onclick='deleteTheme(" + i + ")'>Delete</button>" +
        "</p>";
    }
  }

    function deleteTheme(index) {
    var themes = loadThemes();
    themes.splice(index, 1);
    saveThemes(themes);
    renderThemes(themes);
  }
  renderThemes(loadThemes());
</script>
  </body>
</html>
